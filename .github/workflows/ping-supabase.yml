name: Ping Supabase

on:
  schedule:
    - cron: "0 14 * * 1,4"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase database
        run: |
          curl -f -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/songs?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"